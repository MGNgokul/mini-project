<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js"></script>
<script>requireAuth();</script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
<link rel="icon" type="image/png" sizes="32x32" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="icon" type="image/png" sizes="16x16" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<meta name="theme-color" content="#1e1e2f">
<title>Skills | SkillVault</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(140deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:28px 18px 50px;
}

.page{
  max-width:1200px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.title h1{
  font-size:34px;
  margin-bottom:6px;
}

.title p{
  opacity:0.9;
}

.top-actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-weight:600;
  cursor:pointer;
}

.btn-primary{
  background:#4db5ff;
  color:#0b1920;
}

.btn-ghost{
  background:rgba(255,255,255,0.12);
  color:white;
  border:1px solid rgba(255,255,255,0.2);
}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:18px;
}

.summary-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:14px;
  padding:14px;
}

.summary-card p{
  opacity:0.85;
  font-size:13px;
}

.summary-card h3{
  margin-top:7px;
  font-size:26px;
}

.controls{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
  display:grid;
  grid-template-columns:2fr repeat(4,1fr);
  gap:10px;
}

.controls input,
.controls select{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px 11px;
}

.skill-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
}

.skill-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:16px;
  padding:16px;
}

.skill-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.skill-head h3{
  font-size:20px;
}

.chip{
  font-size:12px;
  border-radius:999px;
  padding:5px 9px;
  border:1px solid rgba(255,255,255,0.3);
}

.meta{
  margin:10px 0;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.meta span{
  font-size:12px;
  padding:4px 8px;
  border-radius:10px;
  background:rgba(0,0,0,0.24);
}

.desc{
  opacity:0.95;
  font-size:13px;
  line-height:1.4;
  min-height:36px;
}

.bar{
  margin-top:12px;
  background:rgba(255,255,255,0.2);
  border-radius:999px;
  overflow:hidden;
  height:9px;
}

.bar > div{
  height:100%;
  background:linear-gradient(90deg,#35d07f,#4db5ff);
}

.card-footer{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.small{
  font-size:12px;
  opacity:0.9;
}

.inline-actions{
  display:flex;
  gap:7px;
}

.tiny{
  border:none;
  border-radius:8px;
  padding:6px 8px;
  font-size:12px;
  cursor:pointer;
}

.tiny-add{
  background:#4db5ff;
  color:#0e2028;
}

.tiny-done{
  background:#2ecc71;
  color:#0e2028;
}

.tiny-delete{
  background:#ff6b6b;
  color:#251616;
}

.empty{
  padding:20px;
  border-radius:14px;
  text-align:center;
  background:rgba(255,255,255,0.12);
  border:1px dashed rgba(255,255,255,0.3);
}

.back{
  margin-top:24px;
  text-align:center;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.modal-content{
  width:100%;
  max-width:520px;
  background:white;
  color:#1b2a36;
  border-radius:15px;
  padding:18px;
}

.form-grid{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-grid .full{
  grid-column:1 / -1;
}

.modal input,
.modal select,
.modal textarea{
  width:100%;
  border:1px solid #d6dbe0;
  border-radius:9px;
  padding:10px;
}

.modal textarea{
  resize:vertical;
  min-height:72px;
}

.error{
  margin-top:10px;
  color:#c0392b;
  font-size:13px;
}

.action-msg{
  margin-bottom:12px;
  font-size:13px;
  min-height:18px;
  color:#79e8aa;
}

@media(max-width:860px){
  .controls{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:620px){
  .controls{
    grid-template-columns:1fr;
  }
  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="header">
    <div class="title">
      <h1>Skills Manager</h1>
      <p>Track important skills, validate learning goals, and focus on what improves your career.</p>
    </div>
    <div class="top-actions">
      <button class="btn btn-primary" onclick="openModal()"><i class="fa fa-plus"></i> Add Skill</button>
      <button class="btn btn-ghost" onclick="resetToDefaults()"><i class="fa fa-rotate-left"></i> Reset Data</button>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card"><p>Total Skills</p><h3 id="sumTotal">0</h3></div>
    <div class="summary-card"><p>Completed</p><h3 id="sumCompleted">0</h3></div>
    <div class="summary-card"><p>In Progress</p><h3 id="sumProgress">0</h3></div>
    <div class="summary-card"><p>Average Progress</p><h3 id="sumAvg">0%</h3></div>
    <div class="summary-card"><p>Total Hours</p><h3 id="sumHours">0</h3></div>
  </div>

  <div class="controls">
    <input id="searchInput" type="text" placeholder="Search by skill name or description">
    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="Frontend">Frontend</option>
      <option value="Backend">Backend</option>
      <option value="Database">Database</option>
      <option value="Tools">Tools</option>
      <option value="Soft Skills">Soft Skills</option>
    </select>
    <select id="statusFilter">
      <option value="">All Status</option>
      <option value="Planned">Planned</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>
    <select id="levelFilter">
      <option value="">All Levels</option>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>
    <select id="sortBy">
      <option value="priority">Sort: Priority</option>
      <option value="progress-desc">Sort: Progress High-Low</option>
      <option value="progress-asc">Sort: Progress Low-High</option>
      <option value="hours-desc">Sort: Hours High-Low</option>
      <option value="date-asc">Sort: Target Date</option>
      <option value="name-asc">Sort: Name A-Z</option>
    </select>
  </div>
  <div id="actionMsg" class="action-msg"></div>

  <div id="skillGrid" class="skill-grid"></div>

  <div class="back">
    <button class="btn btn-ghost" onclick="history.back()"><i class="fa fa-arrow-left"></i> Back</button>
  </div>
</div>

<div class="modal" id="skillModal">
  <div class="modal-content">
    <h3>Add New Skill</h3>
    <div class="form-grid">
      <input id="nameInput" type="text" placeholder="Skill name (e.g., React)">
      <select id="categoryInput">
        <option value="">Select category</option>
        <option value="Frontend">Frontend</option>
        <option value="Backend">Backend</option>
        <option value="Database">Database</option>
        <option value="Tools">Tools</option>
        <option value="Soft Skills">Soft Skills</option>
      </select>
      <select id="levelInput">
        <option value="">Select level</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
      <select id="statusInput">
        <option value="">Select status</option>
        <option value="Planned">Planned</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
      <input id="progressInput" type="number" min="0" max="100" placeholder="Progress (0-100)">
      <input id="hoursInput" type="number" min="0" max="1000" placeholder="Hours spent">
      <input id="targetDateInput" class="full" type="date">
      <textarea id="descInput" class="full" placeholder="Description (15 to 180 chars)"></textarea>
    </div>
    <div id="formError" class="error"></div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addSkill()">Save Skill</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "skillvaultSkills";

const defaultSkills = [
  { id: 1, name: "HTML5", category: "Frontend", level: "Intermediate", status: "Completed", progress: 95, hours: 34, targetDate: "2026-03-30", priority: 2, desc: "Semantic tags, forms, accessibility basics and clean page structure." },
  { id: 2, name: "CSS3", category: "Frontend", level: "Intermediate", status: "In Progress", progress: 78, hours: 46, targetDate: "2026-04-10", priority: 1, desc: "Layouts with Flexbox/Grid, animations, responsive design and reusable components." },
  { id: 3, name: "JavaScript", category: "Frontend", level: "Intermediate", status: "In Progress", progress: 70, hours: 62, targetDate: "2026-04-22", priority: 1, desc: "Core language, async flow, API calls, DOM logic, and modular coding patterns." },
  { id: 4, name: "React", category: "Frontend", level: "Beginner", status: "In Progress", progress: 52, hours: 28, targetDate: "2026-05-05", priority: 1, desc: "Component lifecycle, state management, props, and practical SPA structure." },
  { id: 5, name: "Node.js", category: "Backend", level: "Beginner", status: "Planned", progress: 18, hours: 10, targetDate: "2026-05-18", priority: 2, desc: "Build APIs, middleware handling, and routing conventions for scalable services." },
  { id: 6, name: "Express", category: "Backend", level: "Beginner", status: "Planned", progress: 14, hours: 8, targetDate: "2026-05-24", priority: 2, desc: "REST API setup, auth middleware, error handling and secure request validation." },
  { id: 7, name: "MySQL", category: "Database", level: "Beginner", status: "Planned", progress: 10, hours: 6, targetDate: "2026-06-06", priority: 3, desc: "Relational modeling, joins, indexing basics, and clean query design." },
  { id: 8, name: "Git & GitHub", category: "Tools", level: "Intermediate", status: "Completed", progress: 88, hours: 22, targetDate: "2026-03-28", priority: 2, desc: "Branching strategy, PR workflows, code review etiquette, and version control discipline." },
  { id: 9, name: "Testing Basics", category: "Tools", level: "Beginner", status: "In Progress", progress: 35, hours: 11, targetDate: "2026-05-01", priority: 2, desc: "Unit testing mindset, assertions, and test planning to prevent regressions." },
  { id: 10, name: "Communication", category: "Soft Skills", level: "Intermediate", status: "In Progress", progress: 61, hours: 18, targetDate: "2026-04-15", priority: 3, desc: "Technical explanation, interview communication, and team collaboration clarity." }
];

let skills = [];

const skillGrid = document.getElementById("skillGrid");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const statusFilter = document.getElementById("statusFilter");
const levelFilter = document.getElementById("levelFilter");
const sortBy = document.getElementById("sortBy");

function loadSkills(){
  const stored = localStorage.getItem(STORAGE_KEY);
  if(!stored){
    skills = defaultSkills.slice();
    persist();
    return;
  }

  try{
    const parsed = JSON.parse(stored);
    skills = Array.isArray(parsed) ? parsed : defaultSkills.slice();
  }catch{
    skills = defaultSkills.slice();
  }
}

function persist(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(skills));
}

function escapeText(value){
  return String(value || "").replace(/[<>]/g, "");
}

function getRecommendation(skill){
  if(skill.status === "Completed"){
    return "Recommendation: Build one project using this skill this week.";
  }
  if(skill.progress < 40){
    return "Recommendation: Spend 30 minutes daily and complete one guided lesson.";
  }
  if(skill.progress < 80){
    return "Recommendation: Start a mini project to move from theory to practice.";
  }
  return "Recommendation: Revise weak areas and prepare portfolio-ready examples.";
}

function updateSummary(filtered){
  const total = filtered.length;
  let completed = 0;
  let inProgress = 0;
  let totalProgress = 0;
  let totalHours = 0;

  filtered.forEach(item => {
    if(item.status === "Completed"){ completed++; }
    if(item.status === "In Progress"){ inProgress++; }
    totalProgress += Number(item.progress) || 0;
    totalHours += Number(item.hours) || 0;
  });

  const avg = total ? Math.round(totalProgress / total) : 0;
  document.getElementById("sumTotal").textContent = total;
  document.getElementById("sumCompleted").textContent = completed;
  document.getElementById("sumProgress").textContent = inProgress;
  document.getElementById("sumAvg").textContent = avg + "%";
  document.getElementById("sumHours").textContent = totalHours;
}

function sortSkills(list){
  const mode = sortBy.value;
  const clone = list.slice();

  if(mode === "progress-desc"){ return clone.sort((a,b) => b.progress - a.progress); }
  if(mode === "progress-asc"){ return clone.sort((a,b) => a.progress - b.progress); }
  if(mode === "hours-desc"){ return clone.sort((a,b) => b.hours - a.hours); }
  if(mode === "date-asc"){ return clone.sort((a,b) => new Date(a.targetDate) - new Date(b.targetDate)); }
  if(mode === "name-asc"){ return clone.sort((a,b) => a.name.localeCompare(b.name)); }

  return clone.sort((a,b) => a.priority - b.priority);
}

function applyFilters(){
  const text = searchInput.value.trim().toLowerCase();
  const cat = categoryFilter.value;
  const status = statusFilter.value;
  const level = levelFilter.value;

  let filtered = skills.filter(item => {
    const searchText = (item.name + " " + item.desc).toLowerCase();
    if(text && !searchText.includes(text)){ return false; }
    if(cat && item.category !== cat){ return false; }
    if(status && item.status !== status){ return false; }
    if(level && item.level !== level){ return false; }
    return true;
  });

  filtered = sortSkills(filtered);
  updateSummary(filtered);
  render(filtered);
}

function render(list){
  skillGrid.textContent = "";

  if(list.length === 0){
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No matching skills found. Try changing filters or add a new skill.";
    skillGrid.appendChild(empty);
    return;
  }

  list.forEach(skill => {
    const card = document.createElement("div");
    card.className = "skill-card";

    const head = document.createElement("div");
    head.className = "skill-head";
    const title = document.createElement("h3");
    title.textContent = escapeText(skill.name);
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = skill.status;
    head.appendChild(title);
    head.appendChild(chip);

    const meta = document.createElement("div");
    meta.className = "meta";
    ["Category: " + skill.category, "Level: " + skill.level, "Hours: " + skill.hours, "Target: " + skill.targetDate].forEach(text => {
      const el = document.createElement("span");
      el.textContent = text;
      meta.appendChild(el);
    });

    const desc = document.createElement("p");
    desc.className = "desc";
    desc.textContent = escapeText(skill.desc);

    const barWrap = document.createElement("div");
    barWrap.className = "bar";
    const bar = document.createElement("div");
    bar.style.width = Math.max(0, Math.min(100, Number(skill.progress) || 0)) + "%";
    barWrap.appendChild(bar);

    const footer = document.createElement("div");
    footer.className = "card-footer";
    const text = document.createElement("div");
    text.className = "small";
    text.textContent = skill.progress + "% complete";

    const actions = document.createElement("div");
    actions.className = "inline-actions";

    const plusFive = document.createElement("button");
    plusFive.className = "tiny tiny-add";
    plusFive.textContent = "+5%";
    plusFive.addEventListener("click", function(){
      updateProgress(skill.id, 5);
    });

    const markDone = document.createElement("button");
    markDone.className = "tiny tiny-done";
    markDone.textContent = "Done";
    markDone.addEventListener("click", function(){
      markCompleted(skill.id);
    });

    const remove = document.createElement("button");
    remove.className = "tiny tiny-delete";
    remove.textContent = "Delete";
    remove.addEventListener("click", function(){
      deleteSkill(skill.id);
    });

    actions.appendChild(plusFive);
    actions.appendChild(markDone);
    actions.appendChild(remove);

    footer.appendChild(text);
    footer.appendChild(actions);

    const rec = document.createElement("p");
    rec.className = "small";
    rec.style.marginTop = "10px";
    rec.textContent = getRecommendation(skill);

    card.appendChild(head);
    card.appendChild(meta);
    card.appendChild(desc);
    card.appendChild(barWrap);
    card.appendChild(footer);
    card.appendChild(rec);
    skillGrid.appendChild(card);
  });
}

function updateProgress(id, step){
  const skill = skills.find(item => item.id === id);
  if(!skill){ return; }

  skill.progress = Math.min(100, skill.progress + step);
  if(skill.progress >= 100){
    skill.status = "Completed";
  }else if(skill.progress > 0 && skill.status === "Planned"){
    skill.status = "In Progress";
  }

  persist();
  applyFilters();
}

function markCompleted(id){
  const skill = skills.find(item => item.id === id);
  if(!skill){ return; }
  skill.progress = 100;
  skill.status = "Completed";
  persist();
  applyFilters();
}

function deleteSkill(id){
  const skill = skills.find(item => item.id === id);
  if(!skill){ return; }
  skills = skills.filter(item => item.id !== id);
  persist();
  applyFilters();
  document.getElementById("actionMsg").textContent = skill.name + " deleted.";
}

function openModal(){
  document.getElementById("skillModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("skillModal").style.display = "none";
  document.getElementById("formError").textContent = "";
}

function validateNewSkill(data){
  const namePattern = /^[A-Za-z0-9 .+#-]{2,40}$/;
  const allowedCategories = ["Frontend","Backend","Database","Tools","Soft Skills"];
  const allowedLevels = ["Beginner","Intermediate","Advanced"];
  const allowedStatuses = ["Planned","In Progress","Completed"];

  if(!namePattern.test(data.name)){
    return "Name must be 2-40 characters (letters, numbers, space, . + # -).";
  }

  if(!allowedCategories.includes(data.category)){
    return "Select a valid category.";
  }

  if(!allowedLevels.includes(data.level)){
    return "Select a valid level.";
  }

  if(!allowedStatuses.includes(data.status)){
    return "Select a valid status.";
  }

  if(!Number.isInteger(data.progress) || data.progress < 0 || data.progress > 100){
    return "Progress must be an integer between 0 and 100.";
  }

  if(!Number.isInteger(data.hours) || data.hours < 0 || data.hours > 1000){
    return "Hours must be an integer between 0 and 1000.";
  }

  if(data.desc.length < 15 || data.desc.length > 180){
    return "Description must be 15 to 180 characters.";
  }

  if(!data.targetDate){
    return "Please select a target date.";
  }

  const today = new Date();
  today.setHours(0,0,0,0);
  const selected = new Date(data.targetDate + "T00:00:00");
  if(selected < today){
    return "Target date cannot be in the past.";
  }

  const duplicate = skills.some(item => item.name.toLowerCase() === data.name.toLowerCase());
  if(duplicate){
    return "This skill name already exists.";
  }

  return "";
}

function addSkill(){
  const data = {
    id: Date.now(),
    name: document.getElementById("nameInput").value.trim(),
    category: document.getElementById("categoryInput").value,
    level: document.getElementById("levelInput").value,
    status: document.getElementById("statusInput").value,
    progress: parseInt(document.getElementById("progressInput").value, 10),
    hours: parseInt(document.getElementById("hoursInput").value, 10),
    targetDate: document.getElementById("targetDateInput").value,
    priority: 2,
    desc: document.getElementById("descInput").value.trim()
  };

  const errorMessage = validateNewSkill(data);
  const errorEl = document.getElementById("formError");
  if(errorMessage){
    errorEl.textContent = errorMessage;
    return;
  }

  errorEl.textContent = "";
  skills.push(data);
  persist();
  closeModal();
  clearForm();
  applyFilters();
}

function clearForm(){
  ["nameInput","categoryInput","levelInput","statusInput","progressInput","hoursInput","targetDateInput","descInput"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

function resetToDefaults(){
  skills = defaultSkills.slice();
  persist();
  applyFilters();
  document.getElementById("actionMsg").textContent = "Skill dataset reset to default values.";
}

document.getElementById("skillModal").addEventListener("click", function(e){
  if(e.target.id === "skillModal"){
    closeModal();
  }
});

[searchInput, categoryFilter, statusFilter, levelFilter, sortBy].forEach(control => {
  control.addEventListener("input", applyFilters);
  control.addEventListener("change", applyFilters);
});

loadSkills();
applyFilters();
</script>

</body>
</html>

<html lang="en">
<head>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(140deg,#0f2027,#203a43,#2c5364);
  color:#ecf4f8;
  padding:24px 16px 40px;
}

.page{
  max-width:1150px;
  margin:0 auto;
}

.mobile-topbar{
  display:none;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.header h1{
  font-size:34px;
  margin-bottom:6px;
}

.header p{
  opacity:0.9;
}

.page-msg{
  margin-bottom:12px;
  min-height:18px;
  font-size:13px;
  color:#79e8aa;
}

.btn{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-weight:600;
  cursor:pointer;
}

.btn-light{
  background:rgba(255,255,255,0.14);
  color:#ecf4f8;
  border:1px solid rgba(255,255,255,0.25);
}

.overview{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:14px;
  padding:13px;
}

.stat p{
  opacity:0.88;
  font-size:13px;
}

.stat h3{
  margin-top:7px;
  font-size:24px;
}

.progress-wrap{
  margin-bottom:20px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:14px;
  padding:14px;
}

.progress-head{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:10px;
}

.progress-track{
  height:11px;
  background:rgba(255,255,255,0.2);
  border-radius:999px;
  overflow:hidden;
}

.progress-track div{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#32d17d,#4db5ff);
  transition:width .45s ease;
}

.roadmap{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:13px;
}

.step{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:16px;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.step.locked{
  opacity:0.58;
}

.step-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.step-head h2{
  font-size:20px;
}

.badge{
  border-radius:999px;
  font-size:12px;
  padding:4px 9px;
  border:1px solid rgba(255,255,255,0.35);
}

.meta{
  font-size:12px;
  opacity:0.9;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.meta span{
  background:rgba(0,0,0,0.22);
  padding:4px 8px;
  border-radius:8px;
}

.desc{
  font-size:13px;
  line-height:1.45;
}

.topics{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.topic{
  font-size:12px;
  border-radius:999px;
  padding:4px 8px;
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.2);
}

.actions{
  display:flex;
  gap:8px;
}

.actions button{
  border:none;
  border-radius:10px;
  padding:8px 11px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}

.start-btn{
  background:#4db5ff;
  color:#102026;
}

.done-btn{
  background:#2ecc71;
  color:#102026;
}

.actions button:disabled{
  background:#7e8a90;
  color:#dce5e9;
  cursor:not-allowed;
}

.msg{
  min-height:18px;
  font-size:12px;
}

.msg.error{ color:#ff8c8c; }
.msg.ok{ color:#79e8aa; }

.footer{
  margin-top:22px;
  text-align:center;
}

.mobile-bottom-nav{
  display:none;
}

@media(max-width:640px){
  body{
    padding-bottom:96px;
    padding-top:18px;
  }
  .mobile-topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:#ffffff;
    color:#172230;
    border:1px solid #dbe4ed;
    border-radius:16px;
    padding:12px 14px;
    margin-bottom:16px;
    box-shadow:0 8px 20px rgba(15,32,39,0.08);
  }
  .mobile-topbar strong{
    font-size:18px;
  }
  .mobile-topbar a{
    width:38px;
    height:38px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#172230;
    border:1px solid #dbe4ed;
    background:#f8fbfd;
    font-size:19px;
  }
  .header{
    display:none;
  }
  .overview{
    grid-template-columns:1fr;
  }
  .progress-head{
    flex-direction:column;
    gap:6px;
  }
  .roadmap{
    grid-template-columns:1fr;
  }
  .header h1{ font-size:29px; }
  .mobile-bottom-nav{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:0;
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:2000;
    background:#ffffff;
    border-top:1px solid #dbe4ed;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    box-shadow:0 -10px 24px rgba(15,32,39,0.08);
  }
  .mobile-bottom-nav a{
    text-decoration:none;
    color:#607284;
    border-radius:0;
    min-height:52px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }
  .mobile-bottom-nav a i{
    font-size:21px;
  }
  .mobile-bottom-nav a span{
    display:none;
  }
  .mobile-bottom-nav a.active{
    background:transparent;
    color:#172230;
  }
  .footer{
    display:none;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="mobile-topbar">
    <strong>Roadmap</strong>
    <a href="profile.html" aria-label="Profile"><i class="fa-regular fa-circle-user"></i></a>
  </div>

  <div class="header">
    <div>
      <h1>Learning Roadmap</h1>
      <p>Step-by-step plan with progress validation so users complete learning in sequence.</p>
    </div>
    <button class="btn btn-light" onclick="resetRoadmap()"><i class="fa fa-rotate-left"></i> Reset Progress</button>
  </div>
  <div id="pageMsg" class="page-msg"></div>

  <div class="overview">
    <div class="stat"><p>Total Steps</p><h3 id="sumTotal">0</h3></div>
    <div class="stat"><p>Completed</p><h3 id="sumDone">0</h3></div>
    <div class="stat"><p>Started</p><h3 id="sumStarted">0</h3></div>
    <div class="stat"><p>Pending</p><h3 id="sumPending">0</h3></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-head">
      <span>Overall Progress</span>
      <span id="overallText">0%</span>
    </div>
    <div class="progress-track"><div id="overallBar"></div></div>
  </div>

  <div id="roadmap" class="roadmap"></div>

  <div class="footer">
    <button class="btn btn-light" onclick="window.location.href='dashboard.html'"><i class="fa fa-arrow-left"></i> Back</button>
  </div>
</div>

<nav class="mobile-bottom-nav" aria-label="Mobile navigation">
  <a href="dashboard.html" aria-label="Dashboard"><i class="fa fa-house"></i><span>Dashboard</span></a>
  <a href="skills.html" aria-label="Skill"><i class="fa fa-code"></i><span>Skill</span></a>
  <a href="roadmap.html" class="active" aria-label="Roadmap"><i class="fa fa-map"></i><span>Roadmap</span></a>
  <a href="settings.html" aria-label="Setting"><i class="fa fa-gear"></i><span>Setting</span></a>
</nav>

<script>
const STORAGE_KEY = "roadmapProgressV2";

const steps = [
  { id:1, title:"HTML Fundamentals", duration:"1 Week", level:"Beginner", targetDate:"2026-03-20", topics:["Semantic","Forms","Tables","Accessibility"], desc:"Build strong HTML structure using semantic elements, forms, media, and accessibility practices." },
  { id:2, title:"CSS & Responsive Design", duration:"2 Weeks", level:"Beginner", targetDate:"2026-04-05", topics:["Flexbox","Grid","Media Queries","Animation"], desc:"Design responsive interfaces with proper layout systems and clean visual hierarchy." },
  { id:3, title:"JavaScript Core", duration:"3 Weeks", level:"Intermediate", targetDate:"2026-04-25", topics:["DOM","Events","ES6+","Async"], desc:"Understand JavaScript deeply through DOM manipulation, events, and asynchronous programming." },
  { id:4, title:"React Essentials", duration:"2 Weeks", level:"Intermediate", targetDate:"2026-05-12", topics:["Components","State","Props","Routing"], desc:"Develop reusable UI with component-driven architecture and practical state handling." },
  { id:5, title:"Backend Basics", duration:"3 Weeks", level:"Intermediate", targetDate:"2026-06-05", topics:["Node","Express","REST API","Auth"], desc:"Create secure backend APIs with routing, middleware, validation, and authentication flow." },
  { id:6, title:"Projects & Interview Prep", duration:"2 Weeks", level:"Advanced", targetDate:"2026-06-25", topics:["Portfolio","System Thinking","Mock Interview","Debugging"], desc:"Apply all skills in real projects, polish portfolio, and prepare for interviews confidently." }
];

let state = {
  started: [],
  completed: []
};

function sanitizeState(raw){
  const validIds = steps.map(s => s.id);
  const cleanStarted = Array.isArray(raw && raw.started) ? raw.started.filter(id => validIds.includes(id)) : [];
  const cleanCompleted = Array.isArray(raw && raw.completed) ? raw.completed.filter(id => validIds.includes(id)) : [];

  return {
    started: [...new Set(cleanStarted)],
    completed: [...new Set(cleanCompleted)]
  };
}

function loadState(){
  const stored = localStorage.getItem(STORAGE_KEY);
  if(!stored){
    persistState();
    return;
  }

  try{
    state = sanitizeState(JSON.parse(stored));
    persistState();
  }catch{
    state = { started: [], completed: [] };
    persistState();
  }
}

function persistState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getStepStatus(stepId){
  if(state.completed.includes(stepId)){ return "Completed"; }
  if(state.started.includes(stepId)){ return "In Progress"; }
  return "Not Started";
}

function canStart(stepId){
  if(stepId === 1){ return true; }
  return state.completed.includes(stepId - 1);
}

function canComplete(stepId){
  return state.started.includes(stepId);
}

function setMessage(stepId, text, type){
  const el = document.getElementById("msg-" + stepId);
  if(!el){ return; }
  el.textContent = text;
  el.className = "msg " + (type || "");
}

function startStep(stepId){
  const step = steps.find(s => s.id === stepId);
  if(!step){
    return;
  }

  if(state.completed.includes(stepId)){
    setMessage(stepId, "This step is already completed.", "ok");
    return;
  }

  if(!canStart(stepId)){
    setMessage(stepId, "Complete previous step first.", "error");
    return;
  }

  if(!state.started.includes(stepId)){
    state.started.push(stepId);
  }

  persistState();
  render();
  setMessage(stepId, "Step started successfully.", "ok");
}

function completeStep(stepId){
  const step = steps.find(s => s.id === stepId);
  if(!step){
    return;
  }

  if(!canComplete(stepId)){
    setMessage(stepId, "Start this step before completing it.", "error");
    return;
  }

  if(!state.completed.includes(stepId)){
    state.completed.push(stepId);
  }

  persistState();
  render();
  setMessage(stepId, "Step marked as completed.", "ok");
}

function resetRoadmap(){
  state = { started: [], completed: [] };
  persistState();
  render();
  document.getElementById("pageMsg").textContent = "Roadmap progress reset successfully.";
}

function updateSummary(){
  const total = steps.length;
  const completed = state.completed.length;
  const started = state.started.length;
  const pending = Math.max(0, total - completed);
  const percent = Math.round((completed / total) * 100);

  document.getElementById("sumTotal").textContent = total;
  document.getElementById("sumDone").textContent = completed;
  document.getElementById("sumStarted").textContent = started;
  document.getElementById("sumPending").textContent = pending;
  document.getElementById("overallText").textContent = percent + "%";
  document.getElementById("overallBar").style.width = percent + "%";
}

function render(){
  const container = document.getElementById("roadmap");
  container.textContent = "";

  steps.forEach(step => {
    const status = getStepStatus(step.id);
    const locked = !canStart(step.id) && status === "Not Started";

    const card = document.createElement("div");
    card.className = "step" + (locked ? " locked" : "");

    const head = document.createElement("div");
    head.className = "step-head";

    const title = document.createElement("h2");
    title.textContent = step.title;

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = status;

    head.appendChild(title);
    head.appendChild(badge);

    const meta = document.createElement("div");
    meta.className = "meta";
    [step.duration, step.level, "Target: " + step.targetDate].forEach(item => {
      const chip = document.createElement("span");
      chip.textContent = item;
      meta.appendChild(chip);
    });

    const desc = document.createElement("p");
    desc.className = "desc";
    desc.textContent = step.desc;

    const topics = document.createElement("div");
    topics.className = "topics";
    step.topics.forEach(topicText => {
      const topic = document.createElement("span");
      topic.className = "topic";
      topic.textContent = topicText;
      topics.appendChild(topic);
    });

    const actions = document.createElement("div");
    actions.className = "actions";

    const startBtn = document.createElement("button");
    startBtn.className = "start-btn";
    startBtn.textContent = "Start";
    startBtn.disabled = locked || status !== "Not Started";
    startBtn.addEventListener("click", function(){
      startStep(step.id);
    });

    const doneBtn = document.createElement("button");
    doneBtn.className = "done-btn";
    doneBtn.textContent = "Complete";
    doneBtn.disabled = status !== "In Progress";
    doneBtn.addEventListener("click", function(){
      completeStep(step.id);
    });

    actions.appendChild(startBtn);
    actions.appendChild(doneBtn);

    const msg = document.createElement("div");
    msg.id = "msg-" + step.id;
    msg.className = "msg";

    card.appendChild(head);
    card.appendChild(meta);
    card.appendChild(desc);
    card.appendChild(topics);
    card.appendChild(actions);
    card.appendChild(msg);
    container.appendChild(card);
  });

  updateSummary();
}

loadState();
render();
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="realtime-config.js"></script>
<script src="realtime-sync.js"></script>
</body>
</html>

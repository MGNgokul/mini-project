<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
<link rel="icon" type="image/png" sizes="32x32" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="icon" type="image/png" sizes="16x16" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<meta name="theme-color" content="#1e1e2f">
<title>Forgot Password | SkillVault</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(140deg,#0f2027,#203a43,#2c5364,#1f6c90);
  background-size:220% 220%;
  animation:bg 16s ease infinite;
  color:white;
  padding:20px;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.wrap{
  width:100%;
  max-width:370px;
}

.title{
  text-align:center;
  font-size:34px;
  font-weight:700;
  margin-bottom:6px;
}

.title span{
  color:#8edbff;
}

.subtitle{
  text-align:center;
  font-size:14px;
  opacity:0.9;
  margin-bottom:20px;
}

.group{
  margin-bottom:13px;
}

.group label{
  font-size:12px;
  display:block;
  margin-bottom:6px;
  opacity:0.9;
}

.group input{
  width:100%;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:10px;
  background:rgba(255,255,255,0.12);
  color:white;
  padding:12px;
  outline:none;
  font-size:14px;
}

.group input::placeholder{
  color:rgba(255,255,255,0.72);
}

.group input:focus{
  border-color:#8edbff;
  background:rgba(255,255,255,0.16);
}

.error{
  min-height:15px;
  margin-top:4px;
  color:#ffd1d1;
  font-size:12px;
}

.notice{
  min-height:16px;
  margin:6px 0 8px;
  font-size:12px;
}

.notice.success{
  color:#b9ffd2;
}

.notice.fail{
  color:#ffd1d1;
}

.btn{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#8edbff;
  color:#0f2531;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:transform .2s ease, background-color .2s ease;
}

.btn:hover{
  background:#c2edff;
  transform:translateY(-1px);
}

.links{
  margin-top:12px;
  text-align:center;
  font-size:13px;
}

.links a{
  color:#b9ebff;
  text-decoration:none;
}

@media(max-width:480px){
  .title{font-size:30px;}
}
</style>
</head>

<body>
<div class="wrap">
  <h1 class="title">Skill<span>Vault</span></h1>
  <p class="subtitle">Reset your password and continue learning.</p>

  <form onsubmit="event.preventDefault(); resetPassword();">
    <div class="group">
      <label>Email</label>
      <input type="text" id="email" placeholder="Enter your registered email">
      <div class="error" id="emailError"></div>
    </div>

    <div class="group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="New password">
      <div class="error" id="newPasswordError"></div>
    </div>

    <div class="group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password">
      <div class="error" id="confirmPasswordError"></div>
    </div>

    <div class="notice" id="notice"></div>
    <button class="btn" type="submit">Update Password</button>
  </form>

  <div class="links">
    <a href="login.html">Back to Login</a> |
    <a href="register.html">Create Account</a>
  </div>
</div>

<script>
function arrayBufferToHex(buffer){
  return Array.from(new Uint8Array(buffer))
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

function generateSalt(length){
  const bytes = new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return btoa(String.fromCharCode(...bytes));
}

async function hashPassword(password, salt){
  const encoded = new TextEncoder().encode(password + salt);
  const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
  return arrayBufferToHex(hashBuffer);
}

async function resetPassword(){
  const emailEl = document.getElementById("email");
  const newPasswordEl = document.getElementById("newPassword");
  const confirmPasswordEl = document.getElementById("confirmPassword");

  const email = emailEl.value.trim();
  const newPassword = newPasswordEl.value.trim();
  const confirmPassword = confirmPasswordEl.value.trim();

  const emailError = document.getElementById("emailError");
  const newPasswordError = document.getElementById("newPasswordError");
  const confirmPasswordError = document.getElementById("confirmPasswordError");
  const notice = document.getElementById("notice");

  emailError.textContent = "";
  newPasswordError.textContent = "";
  confirmPasswordError.textContent = "";
  notice.textContent = "";
  notice.className = "notice";

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  const strongPassword = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{6,}$/;
  let valid = true;

  if(!emailPattern.test(email)){
    emailError.textContent = "Enter a valid email address";
    valid = false;
  }

  if(!strongPassword.test(newPassword)){
    newPasswordError.textContent = "Min 6 chars, include uppercase and number";
    valid = false;
  }

  if(newPassword !== confirmPassword){
    confirmPasswordError.textContent = "Passwords do not match";
    valid = false;
  }

  if(!valid){
    return;
  }

  const users = JSON.parse(localStorage.getItem("skillvaultUsers")) || [];
  const user = users.find(item => item.email === email);

  if(!user){
    notice.textContent = "No account found for this email.";
    notice.className = "notice fail";
    return;
  }

  user.passwordSalt = generateSalt(16);
  user.passwordHash = await hashPassword(newPassword, user.passwordSalt);
  delete user.password;

  localStorage.setItem("skillvaultUsers", JSON.stringify(users));

  notice.textContent = "Password updated successfully. Redirecting to login...";
  notice.className = "notice success";

  setTimeout(function(){
    window.location.href = "login.html";
  }, 1200);

}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js"></script>
<script>requireAuth();</script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
<title>Settings | SkillVault</title>

<link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:#f4f6f9;
  min-height:100vh;
}

body.dark{
  background:#1e1e2f;
  color:white;
}

.mobile-topbar{
  display:none;
}

.navbar{
  background:#1e1e2f;
  color:#4db5ff;
  padding:15px 25px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:#4db5ff;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  margin-bottom:25px;
}

body.dark .card{
  background:#2c2c3e;
}

.card h3{
  margin-bottom:20px;
}

.option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

input[type="checkbox"]{
  width:18px;
  height:18px;
}

input[type="password"]{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button.primary{
  background:#4db5ff;
  border:none;
  padding:10px 18px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button.primary:hover{
  background:#1e1e2f;
}

.error{
  color:red;
  font-size:13px;
  margin-bottom:10px;
}

.success{
  color:green;
  font-size:13px;
  margin-bottom:10px;
}

.mobile-bottom-nav{
  display:none;
}

@media(max-width:600px){
  body{
    padding-bottom:96px;
    padding-top:18px;
  }
  .mobile-topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:#ffffff;
    color:#172230;
    border:1px solid #dbe4ed;
    border-radius:16px;
    padding:12px 14px;
    margin:0 14px 16px;
    box-shadow:0 8px 20px rgba(15,32,39,0.08);
  }
  .mobile-topbar strong{
    font-size:18px;
  }
  .mobile-topbar a{
    width:38px;
    height:38px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#172230;
    border:1px solid #dbe4ed;
    background:#f8fbfd;
    font-size:19px;
  }
  .navbar{
    display:none;
  }
  .container{
    margin:0 auto;
    padding:14px;
  }
  .card{
    padding:18px;
  }
  .option{
    gap:12px;
  }
  .mobile-bottom-nav{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:0;
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:2000;
    background:#ffffff;
    border-top:1px solid #dbe4ed;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    box-shadow:0 -10px 24px rgba(15,32,39,0.08);
  }
  .mobile-bottom-nav a{
    text-decoration:none;
    color:#607284;
    border-radius:0;
    min-height:52px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }
  .mobile-bottom-nav a i{
    font-size:21px;
  }
  .mobile-bottom-nav a span{
    display:none;
  }
  .mobile-bottom-nav a.active{
    background:transparent;
    color:#172230;
  }
  .back-btn{
    display:none;
  }
}
</style>
</head>

<body>

<div class="mobile-topbar">
  <strong>Setting</strong>
  <a href="profile.html" aria-label="Profile"><i class="fa-regular fa-circle-user"></i></a>
</div>

<div class="navbar">
  SkillVault - Settings
  <button class="back-btn" onclick="goDashboard()">&larr; Dashboard</button>
</div>

<div class="container">

  <div class="card">
    <h3>Preferences</h3>

    <div class="option">
      <label>Dark Mode</label>
      <input type="checkbox" id="darkMode">
    </div>

    <div class="option">
      <label>Email Notifications</label>
      <input type="checkbox" id="emailNotify" checked>
    </div>
  </div>

  <div class="card">
    <h3>Change Password</h3>

    <div id="msg"></div>

    <input type="password" id="currentPass" placeholder="Current Password">
    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm Password">

    <button class="primary" onclick="updatePassword()">Update Password</button>
  </div>

</div>

<nav class="mobile-bottom-nav" aria-label="Mobile navigation">
  <a href="dashboard.html" aria-label="Dashboard"><i class="fa fa-house"></i><span>Dashboard</span></a>
  <a href="skills.html" aria-label="Skill"><i class="fa fa-code"></i><span>Skill</span></a>
  <a href="roadmap.html" aria-label="Roadmap"><i class="fa fa-map"></i><span>Roadmap</span></a>
  <a href="settings.html" class="active" aria-label="Setting"><i class="fa fa-gear"></i><span>Setting</span></a>
</nav>

<script>
window.onload = function(){
  const settings = JSON.parse(localStorage.getItem("settings"));
  if(settings){
    darkMode.checked = settings.dark;
    emailNotify.checked = settings.email;
    if(settings.dark){
      document.body.classList.add("dark");
    }
  }
};

darkMode.addEventListener("change", saveSettings);
emailNotify.addEventListener("change", saveSettings);

function saveSettings(){
  const settings = {
    dark: darkMode.checked,
    email: emailNotify.checked
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  document.body.classList.toggle("dark", darkMode.checked);
}

function updatePassword(){
  const current = currentPass.value.trim();
  const newP = newPass.value.trim();
  const confirm = confirmPass.value.trim();
  const strong = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{6,}$/;

  msg.textContent = "";
  msg.className = "";

  if(current === "" || newP === "" || confirm === ""){
    msg.textContent = "All fields are required";
    msg.className = "error";
    return;
  }

  const sessionUser = JSON.parse(localStorage.getItem("skillvaultUser"));
  if(!sessionUser || !sessionUser.email){
    msg.textContent = "Please login again";
    msg.className = "error";
    return;
  }

  const users = JSON.parse(localStorage.getItem("skillvaultUsers")) || [];
  const user = users.find(item => item.email === sessionUser.email);

  if(!user){
    msg.textContent = "User not found";
    msg.className = "error";
    return;
  }

  verifyAndUpdatePassword(user, users, current, newP, confirm, strong);
}

function arrayBufferToHex(buffer){
  return Array.from(new Uint8Array(buffer))
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

function generateSalt(length){
  const bytes = new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return btoa(String.fromCharCode(...bytes));
}

async function hashPassword(password, salt){
  const encoded = new TextEncoder().encode(password + salt);
  const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
  return arrayBufferToHex(hashBuffer);
}

async function verifyAndUpdatePassword(user, users, current, newP, confirm, strong){
  let isCurrentPasswordValid = false;

  if(user.passwordHash && user.passwordSalt){
    const currentHash = await hashPassword(current, user.passwordSalt);
    isCurrentPasswordValid = currentHash === user.passwordHash;
  }else if(user.password){
    isCurrentPasswordValid = current === user.password;
  }

  if(!isCurrentPasswordValid){
    msg.textContent = "Current password incorrect";
    msg.className = "error";
    return;
  }

  if(!strong.test(newP)){
    msg.textContent = "Min 6 chars, 1 uppercase, 1 number";
    msg.className = "error";
    return;
  }

  if(newP !== confirm){
    msg.textContent = "Passwords do not match";
    msg.className = "error";
    return;
  }

  user.passwordSalt = generateSalt(16);
  user.passwordHash = await hashPassword(newP, user.passwordSalt);
  delete user.password;
  localStorage.setItem("skillvaultUsers", JSON.stringify(users));

  msg.textContent = "Password Updated Successfully";
  msg.className = "success";

  currentPass.value="";
  newPass.value="";
  confirmPass.value="";
}

function goDashboard(){
  window.location.href = "dashboard.html";
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="realtime-config.js"></script>
<script src="realtime-sync.js"></script>
</body>
</html>

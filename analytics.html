<link rel="icon" type="image/png" sizes="16x16" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="https://static.vecteezy.com/system/resources/previews/011/482/188/non_2x/driving-school-logo-design-steering-wheel-with-cog-and-book-icon-free-vector.jpg">
<meta name="theme-color" content="#1e1e2f">
<title>Skill Development Dashboard | SkillVault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#f4f7fb;
  color:#333;
}

.navbar{
  height:70px;
  background:#1e1e2f;
  color:#4db5ff;
  display:flex;
  align-items:center;
  padding:0 30px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:40px 8%;
}

.section{
  margin-bottom:50px;
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  font-size:14px;
  color:#777;
}

.card p{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

.progress-box{
  margin-top:15px;
}

.progress-bar{
  height:8px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-top:6px;
}

.progress-bar span{
  display:block;
  height:100%;
  width:0;
  background:#4db5ff;
  transition:1.5s;
}

.analysis-box{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.analysis-item{
  margin-bottom:15px;
  font-size:14px;
}

.recommend-box{
  background:#1e1e2f;
  color:white;
  padding:25px;
  border-radius:15px;
}

.recommend-box ul{
  margin-top:15px;
  padding-left:20px;
}

.recommend-box li{
  margin-bottom:8px;
}

.score{
  font-size:32px;
  font-weight:bold;
  margin-top:10px;
  color:#4db5ff;
}

.notice{
  margin-top:8px;
  color:#b54747;
  font-size:13px;
}

@media(max-width:768px){
  .container{
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  SkillVault – Student Skill Development
</div>

<div class="container">

  <div class="section">
    <h2>Learning Performance Overview</h2>
    <div class="card-grid">
      <div class="card">
        <h3>Skills Completed</h3>
        <p id="skills">0</p>
      </div>
      <div class="card">
        <h3>Total Learning Hours</h3>
        <p id="hours">0</p>
      </div>
      <div class="card">
        <h3>Career Readiness Score</h3>
        <div class="score" id="score">0%</div>
        <div id="dataNotice" class="notice"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Skill Strength Analysis</h2>

    <div class="progress-box">
      HTML
      <div class="progress-bar"><span id="htmlBar"></span></div>
    </div>

    <div class="progress-box">
      CSS
      <div class="progress-bar"><span id="cssBar"></span></div>
    </div>

    <div class="progress-box">
      JavaScript
      <div class="progress-bar"><span id="jsBar"></span></div>
    </div>

  </div>

  <div class="section">
    <h2>Performance Analysis</h2>
    <div class="analysis-box" id="analysisText"></div>
  </div>

  <div class="section">
    <h2>Weekly Skill Improvement Plan</h2>
    <div class="recommend-box">
      <strong>Recommended Focus Areas:</strong>
      <ul id="recommendList"></ul>
    </div>
  </div>

</div>

<script>
const ROADMAP_KEY = "roadmapProgressV2";
const SKILLS_KEY = "skillvaultSkills";
const TOTAL_ROADMAP_STEPS = 6;
const VALID_STATUSES = ["Planned", "In Progress", "Completed"];

function safeParse(value){
  try{
    return JSON.parse(value);
  }catch{
    return null;
  }
}

function toInt(value){
  const num = Number(value);
  return Number.isFinite(num) ? Math.round(num) : 0;
}

function clamp(num, min, max){
  return Math.max(min, Math.min(max, num));
}

function sanitizeRoadmap(raw){
  const valid = [1,2,3,4,5,6];
  const started = Array.isArray(raw && raw.started) ? raw.started.filter(id => valid.includes(id)) : [];
  const completed = Array.isArray(raw && raw.completed) ? raw.completed.filter(id => valid.includes(id)) : [];
  const startedSet = new Set(started);

  completed.forEach(id => startedSet.add(id));

  return {
    started: [...startedSet],
    completed: [...new Set(completed)]
  };
}

function sanitizeSkills(raw){
  if(!Array.isArray(raw)){
    return [];
  }

  return raw.map(item => {
    const progress = clamp(toInt(item && item.progress), 0, 100);
    let status = String(item && item.status ? item.status : "Planned");
    status = VALID_STATUSES.includes(status) ? status : "Planned";

    if(progress === 100){
      status = "Completed";
    }else if(progress > 0 && status === "Planned"){
      status = "In Progress";
    }

    return {
      name: String(item && item.name ? item.name : "Unknown"),
      category: String(item && item.category ? item.category : ""),
      status: status,
      progress: progress,
      hours: clamp(toInt(item && item.hours), 0, 1000)
    };
  });
}

function average(values){
  if(values.length === 0){
    return 0;
  }
  const total = values.reduce((sum, n) => sum + n, 0);
  return Math.round(total / values.length);
}

function setWidth(id, value){
  document.getElementById(id).style.width = clamp(value, 0, 100) + "%";
}

function addRecommendation(text){
  const li = document.createElement("li");
  li.textContent = text;
  document.getElementById("recommendList").appendChild(li);
}

function collectQualityIssues(roadmap, skills, hadRoadmapRaw, hadSkillsRaw){
  const issues = [];

  if(!hadRoadmapRaw){
    issues.push("Roadmap dataset not found.");
  }
  if(!hadSkillsRaw){
    issues.push("Skills dataset not found.");
  }

  if(roadmap.completed.length > TOTAL_ROADMAP_STEPS){
    issues.push("Roadmap completed count exceeded total steps and was normalized.");
  }

  for(let i = 2; i <= TOTAL_ROADMAP_STEPS; i++){
    if(roadmap.completed.includes(i) && !roadmap.completed.includes(i - 1)){
      issues.push("Roadmap completion sequence has gaps.");
      break;
    }
  }

  if(skills.length === 0){
    issues.push("No skills data available yet.");
  }

  return issues;
}

const roadmapRaw = safeParse(localStorage.getItem(ROADMAP_KEY));
const skillsRaw = safeParse(localStorage.getItem(SKILLS_KEY));
const roadmap = sanitizeRoadmap(roadmapRaw);
const skills = sanitizeSkills(skillsRaw);

const completedRoadmap = roadmap.completed.length;
const roadmapScore = Math.round((completedRoadmap / TOTAL_ROADMAP_STEPS) * 100);

const completedSkills = skills.filter(s => s.status === "Completed").length;
const learningHours = skills.reduce((sum, s) => sum + s.hours, 0);
const avgSkillProgress = average(skills.map(s => s.progress));

const readinessScore = skills.length
  ? Math.round((roadmapScore * 0.55) + (avgSkillProgress * 0.45))
  : roadmapScore;

document.getElementById("skills").textContent = completedSkills;
document.getElementById("hours").textContent = learningHours;
document.getElementById("score").textContent = readinessScore + "%";

const issues = collectQualityIssues(roadmap, skills, !!roadmapRaw, !!skillsRaw);
if(issues.length){
  document.getElementById("dataNotice").textContent = "Validation: " + issues.join(" ");
}

const htmlSkills = skills.filter(s => s.name.toLowerCase().includes("html"));
const cssSkills = skills.filter(s => s.name.toLowerCase().includes("css"));
const jsSkills = skills.filter(s => s.name.toLowerCase().includes("javascript") || s.name.toLowerCase().includes("js"));

setWidth("htmlBar", htmlSkills.length ? average(htmlSkills.map(s => s.progress)) : (roadmap.completed.includes(1) ? 100 : 20));
setWidth("cssBar", cssSkills.length ? average(cssSkills.map(s => s.progress)) : (roadmap.completed.includes(2) ? 100 : 18));
setWidth("jsBar", jsSkills.length ? average(jsSkills.map(s => s.progress)) : (roadmap.completed.includes(3) ? 100 : 12));

let analysis = "";
if(readinessScore < 40){
  analysis = "Current stage: Beginner. Prioritize fundamentals and maintain daily consistency before adding advanced topics.";
}else if(readinessScore < 75){
  analysis = "Current stage: Growing. You are making steady progress; convert knowledge into mini projects and weekly revision.";
}else{
  analysis = "Current stage: Strong. Focus on real projects, portfolio quality, and interview-level problem solving.";
}
document.getElementById("analysisText").textContent = analysis;

if(!roadmap.completed.includes(1)){
  addRecommendation("Complete HTML structure and forms practice.");
}
if(!roadmap.completed.includes(2)){
  addRecommendation("Improve CSS layout skills using Flexbox/Grid and responsive tasks.");
}
if(!roadmap.completed.includes(3)){
  addRecommendation("Strengthen JavaScript with DOM tasks and async API exercises.");
}
if(!roadmap.completed.includes(4)){
  addRecommendation("Build two React component-based mini projects.");
}
if(!roadmap.completed.includes(5)){
  addRecommendation("Practice backend API development with validation and auth basics.");
}
if(!roadmap.completed.includes(6)){
  addRecommendation("Create one end-to-end capstone project and prepare mock interviews.");
}
if(roadmap.completed.length === TOTAL_ROADMAP_STEPS){
  addRecommendation("Roadmap completed. Move into portfolio polishing and targeted job applications.");
}
if(document.getElementById("recommendList").children.length === 0){
  addRecommendation("Keep momentum by maintaining weekly project and revision targets.");
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="realtime-config.js"></script>
<script src="realtime-sync.js"></script>
</body>
</html>
